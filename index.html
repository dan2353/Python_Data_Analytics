<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Analytics Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f;
  --panel:#0e111a;
  --panel2:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:#263244;
  --accent:#7c3aed;
  --accent2:#38bdf8;
  --green:#22c55e;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#111827 0,#07090f 45%);color:var(--text);font-family:Inter,system-ui,sans-serif}
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh}
.sidebar{background:rgba(14,17,26,.96);border-right:1px solid var(--border);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
.logo{font-size:20px;font-weight:800;margin-bottom:6px}
.tag{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.4}
.search{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:#07090f;color:var(--text);outline:none;margin-bottom:14px}
.nav-btn{display:block;width:100%;text-align:left;padding:12px 13px;margin:7px 0;border:1px solid transparent;border-radius:12px;background:transparent;color:#cbd5e1;font-weight:700;cursor:pointer}
.nav-btn:hover,.nav-btn.active{background:#182033;border-color:#334155;color:#fff}
.main{padding:30px;max-width:1180px;width:100%;margin:0 auto}
.hero{border:1px solid var(--border);background:linear-gradient(135deg,#111827,#0b1020);border-radius:22px;padding:26px;margin-bottom:20px}
.hero h1{margin:0;font-size:34px;letter-spacing:-.03em}
.hero p{color:var(--muted);font-size:16px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.card{background:rgba(17,24,39,.9);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 12px 35px rgba(0,0,0,.25)}
.card h3{margin:0 0 12px;font-size:18px}
.card p{line-height:1.7;color:#d1d5db;margin:0}
.codebox{background:#0d1117;border:1px solid #30363d;border-radius:16px;overflow:hidden}
.code-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#151b23;border-bottom:1px solid #30363d;font-family:"JetBrains Mono",monospace;font-weight:700}
.copy-btn{background:#21262d;color:#e6edf3;border:1px solid #3d444d;border-radius:9px;padding:6px 10px;cursor:pointer}
.copy-btn:hover{background:#30363d}
pre{margin:0;padding:18px;overflow:auto;line-height:1.75;font-family:"JetBrains Mono",monospace;font-size:14px}
code .kw{color:#ff7bcb}
code .fn{color:#d2a8ff}
code .str{color:#a5d6ff}
code .num{color:#ffa657}
code .com{color:#8b949e}
code .var{color:#e6edf3}
code .meth{color:#79c0ff}
.progress{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.pill{padding:7px 10px;border-radius:999px;background:#122033;border:1px solid #243145;color:#cbd5e1;font-size:12px;font-weight:700}
.empty{color:var(--muted);padding:20px}
@media(max-width:800px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.main{padding:18px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">⌘ Data Analytics</div>
    <div class="tag">Interactive Python playbook. Clean, searchable, clickable.</div>
    <input id="search" class="search" placeholder="Search code or topic..." oninput="filterCards()" />
    <nav><button class="nav-btn" data-section="home" onclick="loadSection('home')">Home</button>
<button class="nav-btn" data-section="inspection" onclick="loadSection('inspection')">Inspection</button>
<button class="nav-btn" data-section="cleaning" onclick="loadSection('cleaning')">Cleaning</button>
<button class="nav-btn" data-section="validation" onclick="loadSection('validation')">Validation</button>
<button class="nav-btn" data-section="wrangling" onclick="loadSection('wrangling')">Wrangling</button>
<button class="nav-btn" data-section="eda" onclick="loadSection('eda')">EDA</button>
<button class="nav-btn" data-section="visualization" onclick="loadSection('visualization')">Visualization</button>
<button class="nav-btn" data-section="feature_engineering" onclick="loadSection('feature_engineering')">Feature Engineering</button>
<button class="nav-btn" data-section="statistics" onclick="loadSection('statistics')">Statistics</button>
<button class="nav-btn" data-section="ml_prep" onclick="loadSection('ml_prep')">ML Preparation</button>
<button class="nav-btn" data-section="ml_models" onclick="loadSection('ml_models')">ML Models</button>
<button class="nav-btn" data-section="evaluation" onclick="loadSection('evaluation')">Model Evaluation</button>
<button class="nav-btn" data-section="reporting" onclick="loadSection('reporting')">Reporting</button></nav>
  </aside>
  <main class="main">
    <section class="hero">
      <h1 id="sectionTitle"></h1>
      <p id="sectionSubtitle"></p>
      <div class="progress">
        <span class="pill">Python</span><span class="pill">Pandas</span><span class="pill">Seaborn</span><span class="pill">Plotly</span><span class="pill">Scikit-Learn</span>
      </div>
    </section>
    <section id="content"></section>
  </main>
</div>

<script>
const sections = {"home": {"title": "Data Analytics Playbook", "subtitle": "Python workflow from raw data to insights and machine learning.", "html": "<article class=\"card searchable\" data-title=\"roadmap\"><h3>Roadmap</h3><p>Inspection \u2192 Cleaning \u2192 Validation \u2192 Wrangling \u2192 EDA \u2192 Visualization \u2192 Feature Engineering \u2192 Statistics \u2192 ML Preparation \u2192 ML Models \u2192 Model Evaluation \u2192 Reporting</p></article>\n<article class=\"card searchable\" data-title=\"how to use this website\"><h3>How to use this website</h3><p>Click a module on the left. The main page will load the correct content. Use the search box to find commands like groupby, corr, train_test_split, RandomForest, or RMSE.</p></article>"}, "inspection": {"title": "Data Inspection", "subtitle": "Understand the dataset before changing anything.", "html": "<article class=\"card searchable\" data-title=\"sample dataset\"><div class=\"card-title-row\"><h3>Sample Dataset</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\nimport numpy as np\n\ndata = {\n    &quot;Customer Name&quot;: [&quot;Dan &quot;, &quot;MIKE&quot;, &quot;sarah&quot;, &quot;Dan &quot;, None, &quot;john&quot;],\n    &quot;Age&quot;: [24, &quot;30&quot;, np.nan, 24, -5, &quot;unknown&quot;],\n    &quot;Gender&quot;: [&quot;M&quot;, &quot;male&quot;, &quot;F&quot;, &quot;M&quot;, &quot;Female&quot;, None],\n    &quot;City&quot;: [&quot; Seattle &quot;, &quot;seattle&quot;, &quot;New York&quot;, &quot; Seattle &quot;, np.nan, &quot;new york&quot;],\n    &quot;Sales&quot;: [&quot;1200&quot;, &quot;800&quot;, None, &quot;1200&quot;, &quot;500&quot;, &quot;abc&quot;],\n    &quot;Date&quot;: [&quot;2026-01-10&quot;, &quot;01/15/2026&quot;, &quot;bad date&quot;, &quot;2026-01-10&quot;, None, &quot;2026-02-01&quot;]\n}\n\ndataset = pd.DataFrame(data)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"view data\"><div class=\"card-title-row\"><h3>View Data</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.head()\ndataset.tail()\ndataset.sample(5)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"dataset size\"><div class=\"card-title-row\"><h3>Dataset Size</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.shape\n\n# Output:\n# (6, 6)\n\n# Meaning:\n# 6 rows\n# 6 columns</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"column names\"><div class=\"card-title-row\"><h3>Column Names</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.columns</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"data types\"><div class=\"card-title-row\"><h3>Data Types</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.dtypes</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"full information\"><div class=\"card-title-row\"><h3>Full Information</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.info()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"summary statistics\"><div class=\"card-title-row\"><h3>Summary Statistics</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.describe()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"missing values\"><div class=\"card-title-row\"><h3>Missing Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.isnull().sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"missing value percentage\"><div class=\"card-title-row\"><h3>Missing Value Percentage</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">(dataset.isnull().sum() / len(dataset)) * 100</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"duplicate count\"><div class=\"card-title-row\"><h3>Duplicate Count</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.duplicated().sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"unique values\"><div class=\"card-title-row\"><h3>Unique Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.nunique()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"category values\"><div class=\"card-title-row\"><h3>Category Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;].value_counts()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"unique categories\"><div class=\"card-title-row\"><h3>Unique Categories</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;].unique()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"memory usage\"><div class=\"card-title-row\"><h3>Memory Usage</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.memory_usage(deep=True)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"master inspection workflow\"><h3>Master Inspection Workflow</h3><p>1. Load data<br>2. Check head, tail, sample<br>3. Check shape<br>4. Check columns<br>5. Check data types<br>6. Check missing values<br>7. Check duplicates<br>8. Check categories<br>9. Check summary statistics</p></article>"}, "cleaning": {"title": "Data Cleaning", "subtitle": "Fix dirty values, missing values, wrong types, and messy text.", "html": "<article class=\"card searchable\" data-title=\"clean column names\"><div class=\"card-title-row\"><h3>Clean Column Names</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.columns = (\n    dataset.columns\n    .str.strip()\n    .str.lower()\n    .str.replace(&quot; &quot;, &quot;_&quot;)\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove duplicates\"><div class=\"card-title-row\"><h3>Remove Duplicates</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset.drop_duplicates()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove leading/trailing spaces\"><div class=\"card-title-row\"><h3>Remove Leading/Trailing Spaces</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;city&quot;] = dataset[&quot;city&quot;].str.strip()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"convert to lowercase\"><div class=\"card-title-row\"><h3>Convert To Lowercase</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;city&quot;] = dataset[&quot;city&quot;].str.lower()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"convert to uppercase\"><div class=\"card-title-row\"><h3>Convert To Uppercase</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;city&quot;] = dataset[&quot;city&quot;].str.upper()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove multiple spaces\"><div class=\"card-title-row\"><h3>Remove Multiple Spaces</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;customer_name&quot;] = (\n    dataset[&quot;customer_name&quot;]\n    .str.replace(r&quot;\\s+&quot;, &quot; &quot;, regex=True)\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"replace values\"><div class=\"card-title-row\"><h3>Replace Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;] = dataset[&quot;gender&quot;].replace({\n    &quot;m&quot;: &quot;male&quot;,\n    &quot;f&quot;: &quot;female&quot;\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove special characters\"><div class=\"card-title-row\"><h3>Remove Special Characters</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;customer_name&quot;] = (\n    dataset[&quot;customer_name&quot;]\n    .str.replace(r&quot;[^a-zA-Z ]&quot;, &quot;&quot;, regex=True)\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"count missing values\"><div class=\"card-title-row\"><h3>Count Missing Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.isnull().sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"fill text values\"><div class=\"card-title-row\"><h3>Fill Text Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;city&quot;] = dataset[&quot;city&quot;].fillna(&quot;unknown&quot;)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"fill numeric values with mean\"><div class=\"card-title-row\"><h3>Fill Numeric Values With Mean</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age&quot;] = dataset[&quot;age&quot;].fillna(\n    dataset[&quot;age&quot;].mean()\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"fill numeric values with median\"><div class=\"card-title-row\"><h3>Fill Numeric Values With Median</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age&quot;] = dataset[&quot;age&quot;].fillna(\n    dataset[&quot;age&quot;].median()\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"fill categorical values with mode\"><div class=\"card-title-row\"><h3>Fill Categorical Values With Mode</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;] = dataset[&quot;gender&quot;].fillna(\n    dataset[&quot;gender&quot;].mode()[0]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove rows with missing values\"><div class=\"card-title-row\"><h3>Remove Rows With Missing Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset.dropna()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove columns with missing values\"><div class=\"card-title-row\"><h3>Remove Columns With Missing Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset.dropna(axis=1)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"convert to numeric\"><div class=\"card-title-row\"><h3>Convert To Numeric</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;] = pd.to_numeric(\n    dataset[&quot;sales&quot;],\n    errors=&quot;coerce&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"convert to date\"><div class=\"card-title-row\"><h3>Convert To Date</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;date&quot;] = pd.to_datetime(\n    dataset[&quot;date&quot;],\n    errors=&quot;coerce&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"find negative values\"><div class=\"card-title-row\"><h3>Find Negative Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[dataset[&quot;age&quot;] &lt; 0]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"replace invalid values\"><div class=\"card-title-row\"><h3>Replace Invalid Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.loc[\n    dataset[&quot;age&quot;] &lt; 0,\n    &quot;age&quot;\n] = np.nan</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"replace specific values\"><div class=\"card-title-row\"><h3>Replace Specific Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age&quot;] = dataset[&quot;age&quot;].replace(\n    999,\n    np.nan\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"minimum and maximum\"><div class=\"card-title-row\"><h3>Minimum and Maximum</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age&quot;].min()\ndataset[&quot;age&quot;].max()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"iqr outlier detection\"><div class=\"card-title-row\"><h3>IQR Outlier Detection</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">Q1 = dataset[&quot;sales&quot;].quantile(0.25)\nQ3 = dataset[&quot;sales&quot;].quantile(0.75)\nIQR = Q3 - Q1\n\nlower = Q1 - 1.5 * IQR\nupper = Q3 + 1.5 * IQR\n\noutliers = dataset[\n    (dataset[&quot;sales&quot;] &lt; lower) |\n    (dataset[&quot;sales&quot;] &gt; upper)\n]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"remove outliers\"><div class=\"card-title-row\"><h3>Remove Outliers</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset[\n    (dataset[&quot;sales&quot;] &gt;= lower) &amp;\n    (dataset[&quot;sales&quot;] &lt;= upper)\n]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"cap outliers\"><div class=\"card-title-row\"><h3>Cap Outliers</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;] = dataset[&quot;sales&quot;].clip(\n    lower=0,\n    upper=5000\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"fill missing dates\"><div class=\"card-title-row\"><h3>Fill Missing Dates</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;date&quot;] = dataset[&quot;date&quot;].fillna(\n    dataset[&quot;date&quot;].mode()[0]\n)</code></pre></div></article>"}, "validation": {"title": "Data Validation", "subtitle": "Confirm the dataset is clean and ready before analysis.", "html": "<article class=\"card searchable\" data-title=\"missing values check\"><div class=\"card-title-row\"><h3>Missing Values Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.isnull().sum()\n\n# Expected: 0 missing values</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"duplicate check\"><div class=\"card-title-row\"><h3>Duplicate Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.duplicated().sum()\n\n# Expected: 0</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"data type check\"><div class=\"card-title-row\"><h3>Data Type Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.dtypes</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"category check\"><div class=\"card-title-row\"><h3>Category Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;].unique()\n\n# Expected: male, female, unknown</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"numeric range check\"><div class=\"card-title-row\"><h3>Numeric Range Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age&quot;].min()\ndataset[&quot;age&quot;].max()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"date range check\"><div class=\"card-title-row\"><h3>Date Range Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;date&quot;].min()\ndataset[&quot;date&quot;].max()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"final validation report\"><div class=\"card-title-row\"><h3>Final Validation Report</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.info()\ndataset.isnull().sum()\ndataset.duplicated().sum()\ndataset.describe()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"master workflow\"><h3>Master Workflow</h3><p>1. Load Dataset<br>2. Inspect Dataset<br>3. Clean Dataset<br>4. Validate Dataset<br>5. Ready For Data Wrangling and EDA</p></article>"}, "wrangling": {"title": "Data Wrangling", "subtitle": "Turn clean data into useful data for questions, analysis, charts, and machine learning.", "html": "<article class=\"card searchable\" data-title=\"sample dataset\"><div class=\"card-title-row\"><h3>Sample Dataset</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\n\ndataset = pd.DataFrame({\n    &quot;customer_name&quot;: [&quot;dan&quot;, &quot;mike&quot;, &quot;sarah&quot;, &quot;john&quot;],\n    &quot;age&quot;: [24, 30, 27, 27],\n    &quot;gender&quot;: [&quot;male&quot;, &quot;male&quot;, &quot;female&quot;, &quot;unknown&quot;],\n    &quot;city&quot;: [&quot;seattle&quot;, &quot;seattle&quot;, &quot;new york&quot;, &quot;new york&quot;],\n    &quot;sales&quot;: [1200, 800, 850, 850],\n    &quot;date&quot;: pd.to_datetime([&quot;2026-01-10&quot;, &quot;2026-01-15&quot;, &quot;2026-01-10&quot;, &quot;2026-02-01&quot;])\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"select columns\"><div class=\"card-title-row\"><h3>Select Columns</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[[&quot;customer_name&quot;, &quot;sales&quot;]]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"filter rows\"><div class=\"card-title-row\"><h3>Filter Rows</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[dataset[&quot;sales&quot;] &gt; 800]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"filter with multiple conditions\"><div class=\"card-title-row\"><h3>Filter With Multiple Conditions</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[\n    (dataset[&quot;sales&quot;] &gt; 800) &amp;\n    (dataset[&quot;city&quot;] == &quot;seattle&quot;)\n]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"filter using or\"><div class=\"card-title-row\"><h3>Filter Using OR</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[\n    (dataset[&quot;city&quot;] == &quot;seattle&quot;) |\n    (dataset[&quot;city&quot;] == &quot;new york&quot;)\n]</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"sort values\"><div class=\"card-title-row\"><h3>Sort Values</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.sort_values(&quot;sales&quot;, ascending=False)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"sort multiple columns\"><div class=\"card-title-row\"><h3>Sort Multiple Columns</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.sort_values(\n    [&quot;city&quot;, &quot;sales&quot;],\n    ascending=[True, False]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"create new column\"><div class=\"card-title-row\"><h3>Create New Column</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;tax&quot;] = dataset[&quot;sales&quot;] * 0.10</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"create month column\"><div class=\"card-title-row\"><h3>Create Month Column</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;month&quot;] = dataset[&quot;date&quot;].dt.month</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"create year column\"><div class=\"card-title-row\"><h3>Create Year Column</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;year&quot;] = dataset[&quot;date&quot;].dt.year</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"group by one column\"><div class=\"card-title-row\"><h3>Group By One Column</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"group by multiple columns\"><div class=\"card-title-row\"><h3>Group By Multiple Columns</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby([&quot;city&quot;, &quot;gender&quot;])[&quot;sales&quot;].sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"multiple aggregations\"><div class=\"card-title-row\"><h3>Multiple Aggregations</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby(&quot;city&quot;).agg({\n    &quot;sales&quot;: [&quot;sum&quot;, &quot;mean&quot;, &quot;count&quot;, &quot;max&quot;, &quot;min&quot;],\n    &quot;age&quot;: &quot;mean&quot;\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"pivot table\"><div class=\"card-title-row\"><h3>Pivot Table</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.pivot_table(\n    dataset,\n    values=&quot;sales&quot;,\n    index=&quot;city&quot;,\n    columns=&quot;gender&quot;,\n    aggfunc=&quot;sum&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"rename columns\"><div class=\"card-title-row\"><h3>Rename Columns</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset.rename(columns={\n    &quot;sales&quot;: &quot;total_sales&quot;\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"drop columns\"><div class=\"card-title-row\"><h3>Drop Columns</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset = dataset.drop(columns=[&quot;tax&quot;])</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"merge tables\"><div class=\"card-title-row\"><h3>Merge Tables</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">customers = pd.DataFrame({\n    &quot;customer_name&quot;: [&quot;dan&quot;, &quot;mike&quot;, &quot;sarah&quot;, &quot;john&quot;],\n    &quot;membership&quot;: [&quot;gold&quot;, &quot;silver&quot;, &quot;gold&quot;, &quot;bronze&quot;]\n})\n\ndataset = pd.merge(\n    dataset,\n    customers,\n    on=&quot;customer_name&quot;,\n    how=&quot;left&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"join types\"><div class=\"card-title-row\"><h3>Join Types</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.merge(dataset, customers, on=&quot;customer_name&quot;, how=&quot;inner&quot;)\npd.merge(dataset, customers, on=&quot;customer_name&quot;, how=&quot;left&quot;)\npd.merge(dataset, customers, on=&quot;customer_name&quot;, how=&quot;right&quot;)\npd.merge(dataset, customers, on=&quot;customer_name&quot;, how=&quot;outer&quot;)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"melt wide to long\"><div class=\"card-title-row\"><h3>Melt Wide To Long</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.melt(\n    dataset,\n    id_vars=[&quot;customer_name&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"pivot long to wide\"><div class=\"card-title-row\"><h3>Pivot Long To Wide</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.pivot(\n    index=&quot;customer_name&quot;,\n    columns=&quot;city&quot;,\n    values=&quot;sales&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"final wrangling check\"><div class=\"card-title-row\"><h3>Final Wrangling Check</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.head()\ndataset.shape\ndataset.info()</code></pre></div></article>"}, "eda": {"title": "Exploratory Data Analysis", "subtitle": "Understand the data, find patterns, trends, relationships, and business answers.", "html": "<article class=\"card searchable\" data-title=\"sample dataset\"><div class=\"card-title-row\"><h3>Sample Dataset</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\n\ndataset = pd.DataFrame({\n    &quot;customer_name&quot;: [&quot;dan&quot;, &quot;mike&quot;, &quot;sarah&quot;, &quot;john&quot;],\n    &quot;age&quot;: [24, 30, 27, 27],\n    &quot;gender&quot;: [&quot;male&quot;, &quot;male&quot;, &quot;female&quot;, &quot;female&quot;],\n    &quot;city&quot;: [&quot;seattle&quot;, &quot;seattle&quot;, &quot;new york&quot;, &quot;new york&quot;],\n    &quot;sales&quot;: [1200, 800, 850, 1500]\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"dataset size\"><div class=\"card-title-row\"><h3>Dataset Size</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">len(dataset)\ndataset.shape</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"descriptive statistics\"><div class=\"card-title-row\"><h3>Descriptive Statistics</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.describe()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"specific statistics\"><div class=\"card-title-row\"><h3>Specific Statistics</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].mean()\ndataset[&quot;sales&quot;].median()\ndataset[&quot;sales&quot;].mode()\ndataset[&quot;sales&quot;].sum()\ndataset[&quot;sales&quot;].min()\ndataset[&quot;sales&quot;].max()\ndataset[&quot;sales&quot;].count()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"percentiles\"><div class=\"card-title-row\"><h3>Percentiles</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].quantile(0.25)\ndataset[&quot;sales&quot;].quantile(0.50)\ndataset[&quot;sales&quot;].quantile(0.75)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"category analysis\"><div class=\"card-title-row\"><h3>Category Analysis</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;gender&quot;].value_counts()\ndataset[&quot;gender&quot;].value_counts(normalize=True) * 100\ndataset[&quot;gender&quot;].unique()\ndataset[&quot;gender&quot;].nunique()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"cross tabulation\"><div class=\"card-title-row\"><h3>Cross Tabulation</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.crosstab(\n    dataset[&quot;gender&quot;],\n    dataset[&quot;city&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"ranking\"><div class=\"card-title-row\"><h3>Ranking</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.nlargest(5, &quot;sales&quot;)\ndataset.nsmallest(5, &quot;sales&quot;)\ndataset.sort_values(&quot;sales&quot;, ascending=False)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"group analysis\"><div class=\"card-title-row\"><h3>Group Analysis</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum()\ndataset.groupby(&quot;gender&quot;)[&quot;sales&quot;].sum()\ndataset.groupby([&quot;city&quot;, &quot;gender&quot;])[&quot;sales&quot;].sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"advanced group statistics\"><div class=\"card-title-row\"><h3>Advanced Group Statistics</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].describe()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"multiple aggregations\"><div class=\"card-title-row\"><h3>Multiple Aggregations</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.groupby(&quot;city&quot;).agg({\n    &quot;sales&quot;: [&quot;sum&quot;, &quot;mean&quot;, &quot;min&quot;, &quot;max&quot;, &quot;count&quot;],\n    &quot;age&quot;: &quot;mean&quot;\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"pivot table\"><div class=\"card-title-row\"><h3>Pivot Table</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.pivot_table(\n    dataset,\n    values=&quot;sales&quot;,\n    index=&quot;city&quot;,\n    columns=&quot;gender&quot;,\n    aggfunc=&quot;sum&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"correlation\"><div class=\"card-title-row\"><h3>Correlation</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[[&quot;age&quot;, &quot;sales&quot;]].corr()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"correlation matrix\"><div class=\"card-title-row\"><h3>Correlation Matrix</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.corr(numeric_only=True)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"skewness\"><div class=\"card-title-row\"><h3>Skewness</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].skew()\n\n# 0 = symmetric\n# positive = right skew\n# negative = left skew</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"kurtosis\"><div class=\"card-title-row\"><h3>Kurtosis</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].kurt()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"missing value analysis\"><div class=\"card-title-row\"><h3>Missing Value Analysis</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.isnull().sum()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"quick eda report\"><div class=\"card-title-row\"><h3>Quick EDA Report</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">print(&quot;Rows:&quot;, len(dataset))\nprint(&quot;Columns:&quot;, dataset.shape[1])\nprint(&quot;Total Sales:&quot;, dataset[&quot;sales&quot;].sum())\nprint(&quot;Average Sales:&quot;, dataset[&quot;sales&quot;].mean())\nprint(&quot;Highest Sale:&quot;, dataset[&quot;sales&quot;].max())\nprint(&quot;Lowest Sale:&quot;, dataset[&quot;sales&quot;].min())\n\nprint(&quot;Sales By City:&quot;)\nprint(dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum())\n\nprint(&quot;Sales By Gender:&quot;)\nprint(dataset.groupby(&quot;gender&quot;)[&quot;sales&quot;].sum())</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"eda checklist\"><h3>EDA Checklist</h3><p>How many rows? How many columns? How many missing values? How many duplicates? What are the categories? What are the percentages? What are the top groups? What are the bottom groups? What are the averages? What are the distributions? Are there outliers? Are variables correlated? What business insights exist?</p></article>"}, "visualization": {"title": "Visualization", "subtitle": "Use charts to communicate patterns clearly.", "html": "<article class=\"card searchable\" data-title=\"setup dataset\"><div class=\"card-title-row\"><h3>Setup Dataset</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\nimport matplotlib.pyplot as plt\n\ndataset = pd.DataFrame({\n    &quot;customer_name&quot;: [&quot;dan&quot;, &quot;mike&quot;, &quot;sarah&quot;, &quot;john&quot;, &quot;anna&quot;, &quot;paul&quot;],\n    &quot;age&quot;: [24, 30, 27, 35, 22, 40],\n    &quot;gender&quot;: [&quot;male&quot;, &quot;male&quot;, &quot;female&quot;, &quot;male&quot;, &quot;female&quot;, &quot;male&quot;],\n    &quot;city&quot;: [&quot;seattle&quot;, &quot;seattle&quot;, &quot;new york&quot;, &quot;chicago&quot;, &quot;new york&quot;, &quot;chicago&quot;],\n    &quot;sales&quot;: [1200, 800, 850, 1500, 950, 2000],\n    &quot;date&quot;: pd.to_datetime([\n        &quot;2026-01-10&quot;,\n        &quot;2026-01-15&quot;,\n        &quot;2026-01-20&quot;,\n        &quot;2026-02-01&quot;,\n        &quot;2026-02-10&quot;,\n        &quot;2026-02-15&quot;\n    ])\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"chart selection guide\"><h3>Chart Selection Guide</h3><p>Compare categories \u2192 Bar chart<br>Rank categories \u2192 Horizontal bar chart<br>Trend over time \u2192 Line chart<br>Distribution \u2192 Histogram<br>Outliers \u2192 Boxplot<br>Relationship \u2192 Scatter plot<br>Correlation \u2192 Heatmap<br>Share of total \u2192 Pie chart<br>Interactive dashboard \u2192 Plotly</p></article>\n<article class=\"card searchable\" data-title=\"matplotlib bar chart\"><div class=\"card-title-row\"><h3>Matplotlib Bar Chart</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_by_city = dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum()\n\nsales_by_city.plot(kind=&quot;bar&quot;)\n\nplt.title(&quot;Sales by City&quot;)\nplt.xlabel(&quot;City&quot;)\nplt.ylabel(&quot;Total Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib horizontal bar\"><div class=\"card-title-row\"><h3>Matplotlib Horizontal Bar</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_by_city = dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum().sort_values()\n\nsales_by_city.plot(kind=&quot;barh&quot;)\n\nplt.title(&quot;Sales by City&quot;)\nplt.xlabel(&quot;Total Sales&quot;)\nplt.ylabel(&quot;City&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib line chart\"><div class=\"card-title-row\"><h3>Matplotlib Line Chart</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_by_date = dataset.groupby(&quot;date&quot;)[&quot;sales&quot;].sum()\n\nsales_by_date.plot(kind=&quot;line&quot;)\n\nplt.title(&quot;Sales Trend Over Time&quot;)\nplt.xlabel(&quot;Date&quot;)\nplt.ylabel(&quot;Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib histogram\"><div class=\"card-title-row\"><h3>Matplotlib Histogram</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].plot(kind=&quot;hist&quot;, bins=5)\n\nplt.title(&quot;Sales Distribution&quot;)\nplt.xlabel(&quot;Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib boxplot\"><div class=\"card-title-row\"><h3>Matplotlib Boxplot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].plot(kind=&quot;box&quot;)\n\nplt.title(&quot;Sales Boxplot&quot;)\nplt.ylabel(&quot;Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib scatter plot\"><div class=\"card-title-row\"><h3>Matplotlib Scatter Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.plot(\n    kind=&quot;scatter&quot;,\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;\n)\n\nplt.title(&quot;Age vs Sales&quot;)\nplt.xlabel(&quot;Age&quot;)\nplt.ylabel(&quot;Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib pie chart\"><div class=\"card-title-row\"><h3>Matplotlib Pie Chart</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_by_city = dataset.groupby(&quot;city&quot;)[&quot;sales&quot;].sum()\n\nsales_by_city.plot(\n    kind=&quot;pie&quot;,\n    autopct=&quot;%1.1f%%&quot;\n)\n\nplt.title(&quot;Sales Share by City&quot;)\nplt.ylabel(&quot;&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib multiple lines\"><div class=\"card-title-row\"><h3>Matplotlib Multiple Lines</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_city_date = dataset.pivot_table(\n    values=&quot;sales&quot;,\n    index=&quot;date&quot;,\n    columns=&quot;city&quot;,\n    aggfunc=&quot;sum&quot;\n)\n\nsales_city_date.plot(kind=&quot;line&quot;)\n\nplt.title(&quot;Sales Trend by City&quot;)\nplt.xlabel(&quot;Date&quot;)\nplt.ylabel(&quot;Sales&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"matplotlib formatting\"><div class=\"card-title-row\"><h3>Matplotlib Formatting</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">plt.figure(figsize=(10, 5))\nplt.title(&quot;Sales by City&quot;)\nplt.xlabel(&quot;City&quot;)\nplt.ylabel(&quot;Sales&quot;)\nplt.xticks(rotation=45)\nplt.legend()\nplt.savefig(&quot;sales_report.png&quot;)\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn import\"><div class=\"card-title-row\"><h3>Seaborn Import</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\nimport seaborn as sns\nimport matplotlib.pyplot as plt</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn count plot\"><div class=\"card-title-row\"><h3>Seaborn Count Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.countplot(\n    x=&quot;gender&quot;,\n    data=dataset\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn bar plot\"><div class=\"card-title-row\"><h3>Seaborn Bar Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.barplot(\n    x=&quot;city&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn histogram with kde\"><div class=\"card-title-row\"><h3>Seaborn Histogram With KDE</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.histplot(\n    dataset[&quot;sales&quot;],\n    kde=True\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn boxplot\"><div class=\"card-title-row\"><h3>Seaborn Boxplot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.boxplot(\n    x=&quot;city&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn scatter plot with hue\"><div class=\"card-title-row\"><h3>Seaborn Scatter Plot With Hue</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.scatterplot(\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    hue=&quot;gender&quot;,\n    data=dataset\n)\n\nplt.show()\n\n# hue = color by category</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn line plot\"><div class=\"card-title-row\"><h3>Seaborn Line Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.lineplot(\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn violin plot\"><div class=\"card-title-row\"><h3>Seaborn Violin Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.violinplot(\n    x=&quot;city&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn heatmap\"><div class=\"card-title-row\"><h3>Seaborn Heatmap</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.heatmap(\n    dataset.corr(numeric_only=True),\n    annot=True\n)\n\nplt.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn pair plot\"><div class=\"card-title-row\"><h3>Seaborn Pair Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.pairplot(dataset)\n\nsns.pairplot(\n    dataset,\n    hue=&quot;gender&quot;\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn joint plot\"><div class=\"card-title-row\"><h3>Seaborn Joint Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.jointplot(\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"seaborn regression plot\"><div class=\"card-title-row\"><h3>Seaborn Regression Plot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sns.regplot(\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    data=dataset\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly import\"><div class=\"card-title-row\"><h3>Plotly Import</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import plotly.express as px\nimport plotly.graph_objects as go</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive bar\"><div class=\"card-title-row\"><h3>Plotly Interactive Bar</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_city = (\n    dataset.groupby(&quot;city&quot;)[&quot;sales&quot;]\n    .sum()\n    .reset_index()\n)\n\nfig = px.bar(\n    sales_city,\n    x=&quot;city&quot;,\n    y=&quot;sales&quot;,\n    title=&quot;Sales by City&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive line\"><div class=\"card-title-row\"><h3>Plotly Interactive Line</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.line(\n    dataset,\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    title=&quot;Sales Trend&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive scatter\"><div class=\"card-title-row\"><h3>Plotly Interactive Scatter</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.scatter(\n    dataset,\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    color=&quot;gender&quot;,\n    hover_name=&quot;customer_name&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive histogram\"><div class=\"card-title-row\"><h3>Plotly Interactive Histogram</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.histogram(\n    dataset,\n    x=&quot;sales&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive boxplot\"><div class=\"card-title-row\"><h3>Plotly Interactive Boxplot</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.box(\n    dataset,\n    y=&quot;sales&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive pie\"><div class=\"card-title-row\"><h3>Plotly Interactive Pie</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">sales_city = (\n    dataset.groupby(&quot;city&quot;)[&quot;sales&quot;]\n    .sum()\n    .reset_index()\n)\n\nfig = px.pie(\n    sales_city,\n    names=&quot;city&quot;,\n    values=&quot;sales&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly facet charts\"><div class=\"card-title-row\"><h3>Plotly Facet Charts</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.scatter(\n    dataset,\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    facet_col=&quot;gender&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly bubble chart\"><div class=\"card-title-row\"><h3>Plotly Bubble Chart</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig = px.scatter(\n    dataset,\n    x=&quot;age&quot;,\n    y=&quot;sales&quot;,\n    size=&quot;sales&quot;,\n    color=&quot;gender&quot;\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly interactive heatmap\"><div class=\"card-title-row\"><h3>Plotly Interactive Heatmap</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">corr_matrix = dataset.corr(\n    numeric_only=True\n)\n\nfig = px.imshow(\n    corr_matrix,\n    text_auto=True\n)\n\nfig.show()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"plotly save html\"><div class=\"card-title-row\"><h3>Plotly Save HTML</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">fig.write_html(\n    &quot;dashboard.html&quot;\n)\n\nfig.write_image(\n    &quot;chart.png&quot;\n)</code></pre></div></article>"}, "feature_engineering": {"title": "Feature Engineering", "subtitle": "Turn existing columns into more useful columns.", "html": "<article class=\"card searchable\" data-title=\"sample dataset\"><div class=\"card-title-row\"><h3>Sample Dataset</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import pandas as pd\n\ndataset = pd.DataFrame({\n    &quot;customer_name&quot;: [&quot;dan&quot;,&quot;mike&quot;,&quot;sarah&quot;,&quot;john&quot;],\n    &quot;age&quot;: [24,30,27,45],\n    &quot;city&quot;: [&quot;seattle&quot;,&quot;new york&quot;,&quot;chicago&quot;,&quot;seattle&quot;],\n    &quot;sales&quot;: [1200,800,1500,2000],\n    &quot;cost&quot;: [600,300,900,1200],\n    &quot;date&quot;: pd.to_datetime([\n        &quot;2026-01-15&quot;,\n        &quot;2026-02-10&quot;,\n        &quot;2026-03-20&quot;,\n        &quot;2026-04-05&quot;\n    ])\n})</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"date features\"><div class=\"card-title-row\"><h3>Date Features</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;month&quot;] = dataset[&quot;date&quot;].dt.month\ndataset[&quot;year&quot;] = dataset[&quot;date&quot;].dt.year\ndataset[&quot;quarter&quot;] = dataset[&quot;date&quot;].dt.quarter\ndataset[&quot;day&quot;] = dataset[&quot;date&quot;].dt.day\ndataset[&quot;weekday&quot;] = dataset[&quot;date&quot;].dt.day_name()\ndataset[&quot;week&quot;] = dataset[&quot;date&quot;].dt.isocalendar().week\ndataset[&quot;is_weekend&quot;] = dataset[&quot;date&quot;].dt.dayofweek &gt;= 5</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"numerical features\"><div class=\"card-title-row\"><h3>Numerical Features</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;profit&quot;] = dataset[&quot;sales&quot;] - dataset[&quot;cost&quot;]\n\ndataset[&quot;profit_margin&quot;] = (\n    dataset[&quot;profit&quot;] / dataset[&quot;sales&quot;]\n)\n\ndataset[&quot;profit_pct&quot;] = (\n    dataset[&quot;profit&quot;] / dataset[&quot;sales&quot;]\n) * 100\n\ndataset[&quot;sales_cost_ratio&quot;] = (\n    dataset[&quot;sales&quot;] / dataset[&quot;cost&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"binning age groups\"><div class=\"card-title-row\"><h3>Binning Age Groups</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;age_group&quot;] = pd.cut(\n    dataset[&quot;age&quot;],\n    bins=[0, 25, 35, 50, 100],\n    labels=[&quot;young&quot;, &quot;adult&quot;, &quot;middle&quot;, &quot;senior&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"custom salary groups\"><div class=\"card-title-row\"><h3>Custom Salary Groups</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;salary_level&quot;] = pd.cut(\n    dataset[&quot;salary&quot;],\n    bins=[0, 50000, 100000, 200000],\n    labels=[&quot;low&quot;, &quot;medium&quot;, &quot;high&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"text features\"><div class=\"card-title-row\"><h3>Text Features</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;name_length&quot;] = dataset[&quot;customer_name&quot;].str.len()\n\ndataset[&quot;word_count&quot;] = (\n    dataset[&quot;customer_name&quot;]\n    .str.split()\n    .str.len()\n)\n\ndataset[&quot;first_letter&quot;] = dataset[&quot;customer_name&quot;].str[0]\n\ndataset[&quot;upper_count&quot;] = (\n    dataset[&quot;customer_name&quot;]\n    .str.count(r&quot;[A-Z]&quot;)\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"label encoding\"><div class=\"card-title-row\"><h3>Label Encoding</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">from sklearn.preprocessing import LabelEncoder\n\nencoder = LabelEncoder()\n\ndataset[&quot;gender_encoded&quot;] = (\n    encoder.fit_transform(\n        dataset[&quot;gender&quot;]\n    )\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"one hot encoding\"><div class=\"card-title-row\"><h3>One Hot Encoding</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">pd.get_dummies(\n    dataset[&quot;city&quot;]\n)\n\ndataset = pd.get_dummies(\n    dataset,\n    columns=[&quot;city&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"interaction features\"><div class=\"card-title-row\"><h3>Interaction Features</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;revenue&quot;] = (\n    dataset[&quot;price&quot;] * dataset[&quot;quantity&quot;]\n)\n\ndataset[&quot;bmi&quot;] = (\n    dataset[&quot;weight&quot;] / (dataset[&quot;height&quot;] ** 2)\n)\n\ndataset[&quot;sales_per_customer&quot;] = (\n    dataset[&quot;sales&quot;] / dataset[&quot;customer_count&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"aggregated features\"><div class=\"card-title-row\"><h3>Aggregated Features</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">city_avg = (\n    dataset.groupby(&quot;city&quot;)[&quot;sales&quot;]\n    .transform(&quot;mean&quot;)\n)\n\ndataset[&quot;city_avg_sales&quot;] = city_avg\n\ndataset[&quot;customer_orders&quot;] = (\n    dataset.groupby(&quot;customer_name&quot;)[&quot;customer_name&quot;]\n    .transform(&quot;count&quot;)\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"standardscaler\"><div class=\"card-title-row\"><h3>StandardScaler</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">from sklearn.preprocessing import StandardScaler\n\nscaler = StandardScaler()\n\ndataset[&quot;sales_scaled&quot;] = (\n    scaler.fit_transform(\n        dataset[[&quot;sales&quot;]]\n    )\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"minmaxscaler\"><div class=\"card-title-row\"><h3>MinMaxScaler</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">from sklearn.preprocessing import MinMaxScaler\n\nscaler = MinMaxScaler()\n\ndataset[&quot;sales_scaled&quot;] = (\n    scaler.fit_transform(\n        dataset[[&quot;sales&quot;]]\n    )\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"log transformation\"><div class=\"card-title-row\"><h3>Log Transformation</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">import numpy as np\n\ndataset[&quot;sales_log&quot;] = np.log1p(\n    dataset[&quot;sales&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"feature selection\"><div class=\"card-title-row\"><h3>Feature Selection</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.corr(\n    numeric_only=True\n)\n\ndataset = dataset.drop(\n    columns=[&quot;customer_name&quot;]\n)</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"feature engineering checklist\"><h3>Feature Engineering Checklist</h3><p>Can I create date features?<br>Can I create ratios?<br>Can I create percentages?<br>Can I create profit?<br>Can I create bins?<br>Can I create age groups?<br>Can I create text features?<br>Can I encode categories?<br>Can I create interactions?<br>Can I aggregate by group?<br>Do I need scaling?<br>Do I need log transformation?</p></article>"}, "statistics": {"title": "Statistics", "subtitle": "The math language behind analytics and machine learning.", "html": "<article class=\"card searchable\" data-title=\"descriptive statistics\"><div class=\"card-title-row\"><h3>Descriptive Statistics</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].mean()\ndataset[&quot;sales&quot;].median()\ndataset[&quot;sales&quot;].mode()\ndataset[&quot;sales&quot;].min()\ndataset[&quot;sales&quot;].max()\ndataset[&quot;sales&quot;].std()\ndataset[&quot;sales&quot;].var()\ndataset[&quot;sales&quot;].describe()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"mean\"><h3>Mean</h3><p>Average value. Good when the data is not too affected by outliers.</p></article>\n<article class=\"card searchable\" data-title=\"median\"><h3>Median</h3><p>Middle value. Better than mean when outliers are strong.</p></article>\n<article class=\"card searchable\" data-title=\"mode\"><h3>Mode</h3><p>Most common value. Useful for categories.</p></article>\n<article class=\"card searchable\" data-title=\"variance and standard deviation\"><div class=\"card-title-row\"><h3>Variance and Standard Deviation</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset[&quot;sales&quot;].var()\ndataset[&quot;sales&quot;].std()</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"percentiles and iqr\"><div class=\"card-title-row\"><h3>Percentiles and IQR</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">Q1 = dataset[&quot;sales&quot;].quantile(0.25)\nQ2 = dataset[&quot;sales&quot;].quantile(0.50)\nQ3 = dataset[&quot;sales&quot;].quantile(0.75)\n\nIQR = Q3 - Q1</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"probability\"><h3>Probability</h3><p>Probability measures how likely something is to happen. It goes from 0 to 1.</p></article>\n<article class=\"card searchable\" data-title=\"conditional probability\"><div class=\"card-title-row\"><h3>Conditional Probability</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\"># Probability of A given B\nP_A_given_B = P_A_and_B / P_B</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"bayes theorem\"><div class=\"card-title-row\"><h3>Bayes Theorem</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\"># Bayes idea:\n# Update probability when new evidence appears.\n\nP_A_given_B = (P_B_given_A * P_A) / P_B</code></pre></div></article>\n<article class=\"card searchable\" data-title=\"normal distribution\"><h3>Normal Distribution</h3><p>A bell-shaped distribution. Many natural measurements are close to normal.</p></article>\n<article class=\"card searchable\" data-title=\"binomial distribution\"><h3>Binomial Distribution</h3><p>Used when there are repeated yes/no outcomes, like success/failure.</p></article>\n<article class=\"card searchable\" data-title=\"uniform distribution\"><h3>Uniform Distribution</h3><p>All outcomes have the same chance.</p></article>\n<article class=\"card searchable\" data-title=\"population vs sample\"><h3>Population vs Sample</h3><p>Population is the full group. Sample is the smaller group you actually measure.</p></article>\n<article class=\"card searchable\" data-title=\"hypothesis testing\"><h3>Hypothesis Testing</h3><p>Used to test if a result is real or probably happened by chance.</p></article>\n<article class=\"card searchable\" data-title=\"null and alternative hypothesis\"><h3>Null and Alternative Hypothesis</h3><p>H0 = no effect or no difference. H1 = there is an effect or difference.</p></article>\n<article class=\"card searchable\" data-title=\"p-value\"><h3>P-value</h3><p>Small p-value means the result is less likely to happen by random chance.</p></article>\n<article class=\"card searchable\" data-title=\"type i and type ii errors\"><h3>Type I and Type II Errors</h3><p>Type I error = false positive. Type II error = false negative.</p></article>\n<article class=\"card searchable\" data-title=\"confidence interval\"><h3>Confidence Interval</h3><p>A range of values where the true answer is likely to be.</p></article>\n<article class=\"card searchable\" data-title=\"a/b testing\"><h3>A/B Testing</h3><p>Compare version A and version B to see which performs better.</p></article>\n<article class=\"card searchable\" data-title=\"correlation\"><div class=\"card-title-row\"><h3>Correlation</h3></div><div class=\"codebox\"><div class=\"code-head\"><span>&lt;/&gt; Python</span><button class=\"copy-btn\" onclick=\"copyCode(this)\">Copy</button></div><pre><code class=\"language-python\">dataset.corr(numeric_only=True)\n\n# close to 1  = strong positive relationship\n# close to -1 = strong negative relationship\n# close to 0  = weak relationsh
